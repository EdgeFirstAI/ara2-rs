# cargo-release configuration
# Run: cargo release patch (or minor/major) --execute

shared-version = true
consolidate-commits = true
dependent-version = "upgrade"

allow-branch = ["main"]
sign-commit = true
sign-tag = true
push = true
publish = false  # GitHub Actions handles crates.io publishing
tag-name = "v{{version}}"
pre-release-commit-message = "chore: release v{{version}}"
tag-message = "v{{version}}"

# Update CHANGELOG.md [Unreleased] heading with new version and date
[[pre-release-replacements]]
file = "CHANGELOG.md"
search = "## \\[Unreleased\\]"
replace = "## [Unreleased]\n\n## [{{version}}] - {{date}}"
exactly = 1

# Update CHANGELOG.md [Unreleased] comparison link
[[pre-release-replacements]]
file = "CHANGELOG.md"
search = "\\[Unreleased\\]: (.+)/v(.+)\\.\\.\\.HEAD"
replace = "[Unreleased]: $1/v{{version}}...HEAD\n[{{version}}]: $1/v$2...v{{version}}"
exactly = 1
