name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-22.04
    environment: crates-io
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@56f84321dbccf38fb67ce29ab63e4754056677e0 # master
        with:
          toolchain: stable

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish ara2-sys
        run: cargo publish -p ara2-sys
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish ara2
        run: cargo publish -p ara2
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  create-release:
    name: Create Release
    needs: publish-crates
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download SBOM from sbom.yml workflow
        uses: dawidd6/action-download-artifact@bf251b5aa9c2f7eeb574a96ee720e24f801b7c11 # v6
        with:
          workflow: sbom.yml
          commit: ${{ github.sha }}
          name: sbom
          path: release/

      - name: Prepare SBOM artifacts
        run: |
          mkdir -p assets
          for dir in release/*/; do
            crate="$(basename "$dir")"
            if [ -f "$dir/bom.json" ]; then
              cp "$dir/bom.json" "assets/${crate}-bom.json"
            fi
          done
          ls -la assets/
          if [ -z "$(ls -A assets/)" ]; then
            echo "ERROR: no SBOM files found"
            exit 1
          fi

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${TAG_NAME#v}"
          sed -n "/^## \[${VERSION}\]/,/^## \[/p" CHANGELOG.md | head -n -1 > release_notes.md
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: v${{ steps.changelog.outputs.version }}
          body_path: release_notes.md
          files: assets/*
          generate_release_notes: true
